// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    console.log('Service worker registered — offline ready');
    // Check for updates immediately
    reg.update();
    // Check for updates every 5 minutes when online
    setInterval(function(){
      if(navigator.onLine) reg.update();
    }, 5*60*1000);
    // When a new SW is found and activated, reload to get fresh content
    reg.addEventListener('updatefound', function(){
      var newSW = reg.installing;
      if(newSW){
        newSW.addEventListener('statechange', function(){
          if(newSW.state === 'activated'){
            console.log('New version loaded');
          }
        });
      }
    });
  }).catch(function(err) {
    console.log('SW registration failed:', err);
  });
}

// Offline/online indicator
function updateOnlineStatus() {
  var badge = document.getElementById('offlineBadge');
  if (!navigator.onLine) {
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();
</script>

function autoSave(){

function mkBlank(){
  return {id:"",location:"",city:"",drill_co:"",date_start:"",method:"Direct Push",equipment:"",total_depth:15,gw_first:"N/A",gw_second:"N/A",field_rep:"",backfill:"Bentonite",screen_interval:"N/A",drillers:"",lat:"",lon:"",elevation:"",samplers:[],pid:[],lithology:[],samples:[],gw_samples:[],photos:[],remarks:"",general_notes:""};

function classify(gr,sa,fi){
  var t=gr+sa+fi;if(!t)return{s:"",n:""};
  var pG=gr/t*100,pS=sa/t*100,pF=fi/t*100;
  if(pF>=50){var n="SILT",sym="ML";if(pS>=30&&pS>=pG)n="Sandy "+n;else if(pG>=30&&pG>pS)n="Gravelly "+n;else if(pS>=15&&pS>=pG)n+=" with sand";else if(pG>=15)n+=" with gravel";return{s:sym,n:n};}
  var isG=pG>pS,pr=isG?"GRAVEL":"SAND",oC=isG?pS:pG,oN=isG?"sand":"gravel";
  if(pF<=5){var s1=isG?"GP":"SP";var n1="Poorly graded "+pr;if(oC>=15)n1+=" with "+oN;return{s:s1,n:n1};}
  if(pF<=12){var s2=isG?"GP-GM":"SP-SM";var n2="Poorly graded "+pr+" with silt";if(oC>=15)n2+=" and "+oN;return{s:s2,n:n2};}
  var s3=isG?"GM":"SM";var n3="Silty "+pr;if(oC>=15)n3+=" with "+oN;return{s:s3,n:n3};
}

function buildDesc(nm,sym,col,moi,grd,str,den){

}

function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2000);}

// GPS capture — averages readings over 15 seconds for better accuracy
var _gpsWatchId=null;
var _gpsReadings=[];
var _gpsTimer=null;
window.captureGPS=function(){
  if(!navigator.geolocation){toast("GPS not available on this device");return;}
  _gpsReadings=[];
  toast("Capturing GPS — hold still for 15 seconds...");
  document.getElementById("gpsBtn").textContent="Capturing... 15s";
  document.getElementById("gpsBtn").disabled=true;
  var countdown=15;
  _gpsWatchId=navigator.geolocation.watchPosition(function(pos){
    _gpsReadings.push({lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy,alt:pos.coords.altitude});
  },function(err){
    toast("GPS error: "+err.message);
    stopGPS();
  },{enableHighAccuracy:true,maximumAge:0,timeout:20000});

  _gpsTimer=setInterval(function(){
    countdown--;
    var btn=document.getElementById("gpsBtn");
    if(btn) btn.textContent="Capturing... "+countdown+"s";
    if(countdown<=0) finishGPS();
  },1000);
};

function finishGPS(){
  stopGPS();
  if(_gpsReadings.length===0){toast("No GPS readings captured");return;}
  // Average all readings
  var sumLat=0,sumLon=0,sumAlt=0,altCount=0;
  _gpsReadings.forEach(function(r){sumLat+=r.lat;sumLon+=r.lon;if(r.alt!=null){sumAlt+=r.alt;altCount++;}});
  var avgLat=(sumLat/_gpsReadings.length).toFixed(6);
  var avgLon=(sumLon/_gpsReadings.length).toFixed(6);
  borings[bi].lat=avgLat;
  borings[bi].lon=avgLon;
  if(altCount>0) borings[bi].elevation=(sumAlt/altCount).toFixed(1);
  toast("GPS captured: "+_gpsReadings.length+" readings averaged");
  // Try USGS elevation lookup
  fetchElevation(avgLat,avgLon);
  renderBody();
}

function stopGPS(){
  if(_gpsWatchId!=null){navigator.geolocation.clearWatch(_gpsWatchId);_gpsWatchId=null;}
  if(_gpsTimer){clearInterval(_gpsTimer);_gpsTimer=null;}
  var btn=document.getElementById("gpsBtn");
  if(btn){btn.textContent="Capture GPS";btn.disabled=false;}
}

function fetchElevation(lat,lon){
  fetch("https://epqs.nationalmap.gov/v1/json?x="+lon+"&y="+lat+"&units=Feet&wkid=4326&includeDate=false")
  .then(function(r){return r.json();})
  .then(function(d){
    if(d&&d.value!=null){
      borings[bi].elevation=parseFloat(d.value).toFixed(1);
      toast("Elevation: "+borings[bi].elevation+" ft (USGS)");
      renderBody();
    }
  })
  .catch(function(){/* offline — use GPS altitude if available */});
}

// ===== PHOTO CAPTURE =====
window.takePhoto=function(coreIdx){
  var inp=document.createElement("input");
  inp.type="file";
  inp.accept="image/*";
  inp.capture="environment"; // rear camera
  inp.onchange=function(e){
    var f=e.target.files[0];
    if(!f) return;
    // Resize to max 1200px wide to keep JSON manageable
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var maxW=1200;
        var w=img.width,h=img.height;
        if(w>maxW){h=h*(maxW/w);w=maxW;}
        var canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        var ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        var data=canvas.toDataURL("image/jpeg",0.7);
        if(!borings[bi].photos) borings[bi].photos=[];
        borings[bi].photos.push({
          data:data,
          core_run:coreIdx!=null?coreIdx:-1,
          depth_top:coreIdx!=null?(borings[bi].samplers[coreIdx]||{}).top||"":"",
          depth_bot:coreIdx!=null?(borings[bi].samplers[coreIdx]||{}).bot||"":"",
          note:"",
          time:new Date().toLocaleTimeString("en-US",{hour12:false,hour:"2-digit",minute:"2-digit"})
        });
        toast("Photo added");
        renderBody();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };
  inp.click();
};

window.deletePhoto=function(idx){
  if(confirm("Delete this photo?")){

};

var SOIL_PARSE_PROMPT='You are a geotechnical field data parser. Extract soil description fields from spoken transcripts by field geologists describing soil cores.\n\nReturn ONLY a JSON object with these fields (use "" if not mentioned):\n{\n"uscs_override": "AC" for asphalt, "FILL" for fill material, "TOP" for topsoil, or "" for natural soil (let auto-classify handle it)\n"color": closest match from: brown, dark brown, light brown, grayish brown, greenish brown, yellowish brown, gray, dark gray, light gray, brownish gray, greenish gray, beige, reddish brown, black, tan, olive, orange, mottled brown and gray, white\n"moisture": one of: dry, moist, moist to wet, wet, saturated. If they describe a transition (e.g. "dry above 3 ft, damp below"), use the dominant or deeper moisture.\n"gradation": one of: fine, medium, coarse, fine to medium, fine to coarse, medium to coarse, very fine to medium\n"structure": one of: massive, stratified, laminated, homogeneous, fissured, lensed, blocky\n"density": one of: very loose, loose, medium dense, dense, very dense, soft, firm, stiff, very stiff, hard, or "". Use "loose"/"dense" for coarse soils, "soft"/"stiff" for fine soils.\n"extra": one of: with crushed shells, with woody debris, with cobbles, with organics, with roots, or ""\n"pct_gravel": number 0-100\n"pct_sand": number 0-100\n"pct_fines": number 0-100\n"top_ft": number or null if not mentioned\n"bot_ft": number or null if not mentioned\n"notes": any extra info mentioned (moisture transitions, odors, staining, sheens, color changes) as a short string, or ""\n}\n\nRules:\n- ASPHALT/CONCRETE/PAVEMENT: set uscs_override="AC", pct_gravel=0, pct_sand=0, pct_fines=0\n- FILL/BASE COURSE/CRUSHED ROCK: set uscs_override="FILL"\n- TOPSOIL/SOD/ORGANIC TOPSOIL: set uscs_override="TOP"\n- For natural soil: leave uscs_override="" and set percentages. Auto-classification will handle USCS.\n- Percentages must sum to 100. If only two given, calculate the third.\n- If they say "silty sand" without percentages, estimate: gravel 0, sand 70, fines 30\n- If they say "sandy silt", estimate: gravel 0, sand 35, fines 65\n- If they say "gravel with fines and sand" or similar, use context and stated percentages\n- "with gravel" without a percentage means 10-25% gravel\n- "damp" = "moist", "saturated" = "wet"\n- Map approximate colors: "greenish" → greenish brown or greenish gray. Use closest match.\n- Capture density/consistency terms: loose, dense, soft, stiff, etc.\n- Put moisture transitions, odors, staining, sheens, color changes in the "notes" field\n- Return ONLY the JSON, no other text.';

window.startVoice=function(layerIdx){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast("Speech recognition not available on this browser");return;}

  // If already listening, stop
  if(window._activeRecognition){
    window._activeRecognition.stop();
    return;
  }

  var recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang="en-US";
  window._activeRecognition=recognition;
  var fullTranscript="";

  var btn=document.getElementById("voiceBtn_"+layerIdx);
  if(btn){btn.textContent="🎙 Listening... (say STOP)";btn.style.background="#dc2626";}

  recognition.onresult=function(event){
    var interim="";
    fullTranscript="";
    for(var i=0;i<event.results.length;i++){
      var t=event.results[i][0].transcript;
      if(event.results[i].isFinal){
        fullTranscript+=t+" ";
      } else {
        interim+=t;
      }
    }
    var combined=(fullTranscript+interim).trim();
    // Show what's being heard
    if(btn){
      var preview=combined.length>30?combined.substring(combined.length-30)+"...":combined;
      btn.textContent="🎙 "+preview;
    }
    // Check for "stop" command
    var lower=combined.toLowerCase();
    if(lower.endsWith("stop")||lower.endsWith("stop.")||lower.endsWith("stop recording")){
      recognition.stop();
      // Remove the "stop" word from transcript
      fullTranscript=combined.replace(/\s*(stop recording|stop)\.?\s*$/i,"").trim();
      if(btn){btn.textContent="🎙 Processing...";btn.style.background="#d97706";}
      toast("Heard: "+fullTranscript.substring(0,50)+"...");
      window._activeRecognition=null;
      processVoiceResult(fullTranscript,layerIdx);
    }
  };

  recognition.onerror=function(event){
    toast("Voice error: "+event.error);
    if(btn){btn.textContent="🎙 Speak";btn.style.background="#7c3aed";}
    window._activeRecognition=null;
  };

  recognition.onend=function(){
    // If stopped without "stop" command (e.g., tapped button to stop)
    if(window._activeRecognition===recognition){
      window._activeRecognition=null;
      fullTranscript=fullTranscript.trim();
      if(fullTranscript){
        if(btn){btn.textContent="🎙 Processing...";btn.style.background="#d97706";}
        toast("Heard: "+fullTranscript.substring(0,50)+"...");
        processVoiceResult(fullTranscript,layerIdx);
      } else {
        if(btn){btn.textContent="🎙 Speak";btn.style.background="#7c3aed";}
      }
    }
  };

  recognition.start();
};

// ===== OFFLINE PARSER =====
function parseOffline(t){
  var low=t.toLowerCase();
  // Normalize common speech-to-text errors
  low=low.replace(/\bfinds\b/g,"fines").replace(/\bfind\b/g,"fines");
  low=low.replace(/\bmodeled\b/g,"mottled").replace(/\bmodelled\b/g,"mottled");
  low=low.replace(/\bcourse\b/g,"coarse");
  low=low.replace(/\bgrate\b/g,"great").replace(/\bgraded\b/g,"graded");
  low=low.replace(/\bgrey\b/g,"gray");
  low=low.replace(/\bdamp\b/g,"moist");
  low=low.replace(/\btend to\b/g,"tan to");
  low=low.replace(/\bpercent\b/g,"%");
  low=low.replace(/\bsite\b/g,"silt").replace(/\bsilk\b/g,"silt");
  low=low.replace(/\bsilts\b/g,"silt");
  low=low.replace(/\bsands\b/g,"sand");
  low=low.replace(/\bgravels\b/g,"gravel");
  low=low.replace(/\bclays\b/g,"clay");
  low=low.replace(/\bcork\b/g,"core").replace(/\bcourt\b/g,"core");
  low=low.replace(/\bverify\b/g,"very fine");
  low=low.replace(/very fine sand/g,"sand"); // normalize for pct matching
  low=low.replace(/fine to medium sand/g,"sand");
  low=low.replace(/fine to coarse sand/g,"sand");
  low=low.replace(/medium to coarse sand/g,"sand");
  low=low.replace(/fine sand/g,"sand");
  low=low.replace(/medium sand/g,"sand");
  low=low.replace(/coarse sand/g,"sand");
  low=low.replace(/fine gravel/g,"gravel");
  low=low.replace(/coarse gravel/g,"gravel");
  var r={uscs_override:"",color:"",moisture:"",gradation:"",structure:"massive",density:"",extra:"",pct_gravel:null,pct_sand:null,pct_fines:null,top_ft:null,bot_ft:null,notes:"",_confidence:0,_matched:[]};

  // Special types
  if(/asphalt|pavement|concrete|ac\b/.test(low)){r.uscs_override="AC";r._confidence+=3;r._matched.push("AC");}
  else if(/\bfill\b|base course|crushed rock|road base/.test(low)){r.uscs_override="FILL";r._confidence+=3;r._matched.push("FILL");}
  else if(/topsoil|top soil|\bsod\b/.test(low)){r.uscs_override="TOP";r._confidence+=3;r._matched.push("TOP");}

  // Colors — use ORIGINAL transcript (before sand normalization) for gradation, but normalized for color
  var origLow=t.toLowerCase().replace(/\bfinds\b/g,"fines").replace(/\bmodeled\b/g,"mottled").replace(/\bgrey\b/g,"gray").replace(/\btend to\b/g,"tan to").replace(/\bcourse\b/g,"coarse").replace(/\bdamp\b/g,"moist").replace(/\bsilk\b/g,"silt").replace(/\bverify\b/g,"very fine").replace(/\bcork\b/g,"core").replace(/\bcourt\b/g,"core");
  var colors=[["mottled brown and gray",/mottled/],["greenish brown",/greenish brown/],["yellowish brown",/yellowish brown/],["grayish brown",/grayish brown/],["brownish gray",/brownish gray/],["greenish gray",/greenish gray/],["reddish brown",/reddish brown/],["dark brown",/dark brown/],["light brown",/light brown/],["dark gray",/dark gray/],["light gray",/light gray/],["brown",/\bbrown\b/],["gray",/\bgray\b/],["beige",/\bbeige\b/],["black",/\bblack\b/],["tan",/\btan\b/],["olive",/\bolive\b/],["orange",/\borange\b/],["white",/\bwhite\b/]];
  for(var ci=0;ci<colors.length;ci++){if(colors[ci][1].test(origLow)){r.color=colors[ci][0];r._confidence++;r._matched.push("color");break;}}

  // Moisture
  if(/\bsaturated\b/.test(low)){r.moisture="wet";r._confidence++;r._matched.push("moisture");}
  else if(/\bwet\b/.test(low)){r.moisture="wet";r._confidence++;r._matched.push("moisture");}
  else if(/moist to wet/.test(low)){r.moisture="moist to wet";r._confidence++;r._matched.push("moisture");}
  else if(/\bdamp\b|\bmoist\b/.test(low)){r.moisture="moist";r._confidence++;r._matched.push("moisture");}
  else if(/\bdry\b/.test(low)){r.moisture="dry";r._confidence++;r._matched.push("moisture");}

  // Gradation — use origLow to preserve "fine to medium" etc.
  if(/very fine to medium/.test(origLow)){r.gradation="very fine to medium";r._confidence++;r._matched.push("grad");}
  else if(/fine to coarse/.test(origLow)){r.gradation="fine to coarse";r._confidence++;r._matched.push("grad");}
  else if(/fine to medium/.test(origLow)){r.gradation="fine to medium";r._confidence++;r._matched.push("grad");}
  else if(/medium to coarse/.test(origLow)){r.gradation="medium to coarse";r._confidence++;r._matched.push("grad");}
  else if(/\bcoarse\b/.test(origLow)){r.gradation="coarse";r._confidence++;r._matched.push("grad");}
  else if(/\bmedium\b/.test(origLow)&&!/medium dense/.test(origLow)){r.gradation="medium";r._confidence++;r._matched.push("grad");}
  else if(/\bfine\b/.test(origLow)&&!/fines/.test(origLow)){r.gradation="fine";r._confidence++;r._matched.push("grad");}

  // Structure
  if(/\bstratified\b/.test(low)){r.structure="stratified";r._confidence++;r._matched.push("struct");}
  else if(/\blaminated\b|\bbedding\b|\bbedded\b/.test(low)){r.structure="laminated";r._confidence++;r._matched.push("struct");}
  else if(/\bfissured\b/.test(low)){r.structure="fissured";r._confidence++;r._matched.push("struct");}
  else if(/\blensed\b/.test(low)){r.structure="lensed";r._confidence++;r._matched.push("struct");}
  else if(/\bblocky\b/.test(low)){r.structure="blocky";r._confidence++;r._matched.push("struct");}
  else if(/\bmassive\b/.test(low)){r.structure="massive";r._confidence++;}

  // Density
  if(/very loose/.test(low)){r.density="very loose";r._confidence++;r._matched.push("density");}
  else if(/very dense/.test(low)){r.density="very dense";r._confidence++;r._matched.push("density");}
  else if(/medium dense/.test(low)){r.density="medium dense";r._confidence++;r._matched.push("density");}
  else if(/very stiff/.test(low)){r.density="very stiff";r._confidence++;r._matched.push("density");}
  else if(/very soft/.test(low)){r.density="very soft";r._confidence++;r._matched.push("density");}
  else if(/\bloose\b/.test(low)){r.density="loose";r._confidence++;r._matched.push("density");}
  else if(/\bdense\b/.test(low)){r.density="dense";r._confidence++;r._matched.push("density");}
  else if(/\bsoft\b/.test(low)){r.density="soft";r._confidence++;r._matched.push("density");}
  else if(/\bstiff\b/.test(low)){r.density="stiff";r._confidence++;r._matched.push("density");}
  else if(/\bfirm\b/.test(low)){r.density="firm";r._confidence++;r._matched.push("density");}
  else if(/\bhard\b/.test(low)){r.density="hard";r._confidence++;r._matched.push("density");}

  // Extras
  if(/crushed shells|shells/.test(low)){r.extra="with crushed shells";r._confidence++;r._matched.push("extra");}
  else if(/woody debris|wood/.test(low)){r.extra="with woody debris";r._confidence++;r._matched.push("extra");}
  else if(/\bcobbles?\b/.test(low)){r.extra="with cobbles";r._confidence++;r._matched.push("extra");}
  else if(/\borganics?\b/.test(low)){r.extra="with organics";r._confidence++;r._matched.push("extra");}
  else if(/\broots?\b/.test(low)){r.extra="with roots";r._confidence++;r._matched.push("extra");}

  // Percentages — look for patterns like "10 gravel 80 sand 10 fines" or "gravel is 10%"
  // Normalize "fine" to "fines" for percentage matching (but not "fine to" gradation)
  var pctText=low.replace(/\bfine\b(?!\s+to)/g,"fines");
  // Pattern 1: number-type-number-type-number-type (10% gravel 80% sand 10% fines)
  // Pattern 2: type-number-type-number-type-number (gravel is 10% sand is 80% fines 10%)
  var pctPatterns=[
    /(\d+)\s*%?\s*gravel.*?(\d+)\s*%?\s*sand.*?(\d+)\s*%?\s*fines/i,
    /gravel\s*(?:is\s*)?(\d+)\s*%?.*?sand\s*(?:is\s*)?(\d+)\s*%?.*?fines?\s*(?:is\s*|just\s*)?(\d+)\s*%?/i
  ];
  for(var pi=0;pi<pctPatterns.length;pi++){
    var pm=pctText.match(pctPatterns[pi]);
    if(pm){
      var g=+pm[1],sa=+pm[2],fi=+pm[3];
      if(g+sa+fi===100||(g<=100&&sa<=100&&fi<=100)){
        r.pct_gravel=g;r.pct_sand=sa;r.pct_fines=fi;
        if(g+sa+fi!==100){var rem=100-g-sa;if(rem>=0)r.pct_fines=rem;}
        r._confidence+=2;r._matched.push("pcts");break;
      }
    }
  }
  // Try individual extraction — PREFER type-before-number (more reliable in speech)
  if(r.pct_gravel==null){
    var gm=low.match(/gravel\s*(?:is\s*)?(\d+)\s*%?/)||low.match(/(\d+)\s*%?\s*gravel/);
    var sm2=low.match(/sand\s*(?:is\s*)?(\d+)\s*%?/)||low.match(/(\d+)\s*%?\s*sand/);
    var fm=pctText.match(/fines?\s*(?:is\s*|just\s*)?(\d+)\s*%?/)||pctText.match(/(\d+)\s*%?\s*fines/);
    if(gm)r.pct_gravel=+gm[1];
    if(sm2)r.pct_sand=+sm2[1];
    if(fm)r.pct_fines=+fm[1];
    if(gm)r.pct_gravel=+gm[1];
    if(sm2)r.pct_sand=+sm2[1];
    if(fm)r.pct_fines=+fm[1];
    if(gm)r.pct_gravel=+gm[1];
    if(sm2)r.pct_sand=+sm2[1];
    if(fm)r.pct_fines=+fm[1];
    if(r.pct_gravel!=null||r.pct_sand!=null||r.pct_fines!=null){
      if(r.pct_gravel==null)r.pct_gravel=0;
      if(r.pct_sand==null&&r.pct_fines!=null)r.pct_sand=100-r.pct_gravel-r.pct_fines;
      if(r.pct_fines==null&&r.pct_sand!=null)r.pct_fines=100-r.pct_gravel-r.pct_sand;
      if(r.pct_sand==null)r.pct_sand=0;
      if(r.pct_fines==null)r.pct_fines=0;
      r._confidence++;r._matched.push("pcts-partial");
    }
  }

  // Depths — multiple patterns for natural speech
  // "at X feet" for bottom depth
  var dm3=low.match(/(?:bottom|bot)\s*(?:of\s*(?:the\s*)?(?:core|run|boring))?\s*(?:at|is)?\s*(\d+(?:\.\d+)?)\s*(?:feet|ft|foot)?/);
  // "from X to Y" or "X to Y feet"  
  var dm=low.match(/(?:from\s+)?(\d+(?:\.\d+)?)\s*(?:to|through)\s*(\d+(?:\.\d+)?)\s*(?:feet|ft|foot)?/);
  // "extends from X to Y"
  var dm4=low.match(/extends?\s+from\s+(\d+(?:\.\d+)?)\s*(?:to|through)\s*(\d+(?:\.\d+)?)/);
  // "surface to X"
  var dm2=low.match(/surface\s+to\s+(\d+(?:\.\d+)?)/);
  
  if(dm4){r.top_ft=+dm4[1];r.bot_ft=+dm4[2];r._confidence++;r._matched.push("depth");}
  else if(dm){r.top_ft=+dm[1];r.bot_ft=+dm[2];r._confidence++;r._matched.push("depth");}
  else if(dm2){r.top_ft=0;r.bot_ft=+dm2[1];r._confidence++;r._matched.push("depth");}
  // Override bot with explicit "bottom at X" if found
  if(dm3&&r.top_ft!=null){r.bot_ft=+dm3[1];}

  // Notes — odor, sheen, staining, moisture transitions, plasticity, softening
  var noteItems=[];
  if(/\bodor\b|\bsmell\b|petroleum/.test(origLow)) noteItems.push("Odor noted");
  if(/\bsheen\b/.test(origLow)) noteItems.push("Sheen observed");
  if(/\bplastic\b|\bplasticity\b/.test(origLow)){
    var plasticMatch=origLow.match(/(lightly|slightly|moderately|highly|very)?\s*plastic/);
    noteItems.push(plasticMatch&&plasticMatch[1]?plasticMatch[1]+" plastic":"Plastic");
  }
  if(/\bstaining\b|\bstain\b/.test(origLow)){
    var stm=origLow.match(/(?:red|brown|dark|black)?\s*staining?\s*(?:at\s+(\d+(?:\.\d+)?)\s*(?:to\s*(\d+(?:\.\d+)?))?\s*(?:feet|ft)?)?/i);
    noteItems.push(stm?"Staining"+(stm[1]?" at "+stm[1]+(stm[2]?"-"+stm[2]:"")+" ft":""):"Staining noted");
  }
  if(/becomes?\s+(?:softer|harder|stiffer|looser|denser)/i.test(origLow)){
    var softM=origLow.match(/becomes?\s+(softer|harder|stiffer|looser|denser)\s*(?:(?:down|at|around|below)\s*(?:lower|(\d+(?:\.\d+)?)\s*(?:feet|ft)?))?/i);
    if(softM) noteItems.push("Becomes "+softM[1]+(softM[2]?" at "+softM[2]+" ft":" with depth"));
  }
  if(/becomes?\s+(?:more\s+)?(?:wet|moist|damp|saturated)\s*(?:(?:at|around|below)\s*(\d+(?:\.\d+)?)\s*(?:feet|ft)?)?/i.test(origLow)){
    var mm=origLow.match(/becomes?\s+(?:more\s+)?(?:wet|moist|damp|saturated)\s*(?:(?:at|around|below)\s*(\d+(?:\.\d+)?)\s*(?:feet|ft)?)?/i);
    noteItems.push("Becomes wetter"+(mm&&mm[1]?" at "+mm[1]+" ft":" with depth"));
  }
  if(noteItems.length)r.notes=noteItems.join(". ");

  // Soil type estimation from keywords — if no explicit pcts, estimate from description
  if(r.pct_gravel==null&&r.pct_sand==null&&r.pct_fines==null&&!r.uscs_override){
    if(/clay\s*silt|silty\s*clay/i.test(origLow)){r.pct_gravel=0;r.pct_sand=10;r.pct_fines=90;r._confidence++;r._matched.push("soil-hint");}
    else if(/\bclay\b/i.test(origLow)&&!/with clay/.test(origLow)){r.pct_gravel=0;r.pct_sand=10;r.pct_fines=90;r._confidence++;r._matched.push("soil-hint");}
    else if(/sandy\s*silt/i.test(origLow)){r.pct_gravel=0;r.pct_sand=35;r.pct_fines=65;r._confidence++;r._matched.push("soil-hint");}
    else if(/\bsilt\b/i.test(origLow)&&!/silty/.test(origLow)){r.pct_gravel=0;r.pct_sand=20;r.pct_fines=80;r._confidence++;r._matched.push("soil-hint");}
    else if(/silty\s*sand/i.test(origLow)){r.pct_gravel=0;r.pct_sand=70;r.pct_fines=30;r._confidence++;r._matched.push("soil-hint");}
    else if(/sandy\s*gravel/i.test(origLow)){r.pct_gravel=50;r.pct_sand=40;r.pct_fines=10;r._confidence++;r._matched.push("soil-hint");}
    else if(/\bgravel\b/i.test(origLow)&&!/with gravel/.test(origLow)){r.pct_gravel=55;r.pct_sand=40;r.pct_fines=5;r._confidence++;r._matched.push("soil-hint");}
    else if(/\bsand\b/i.test(origLow)){r.pct_gravel=0;r.pct_sand=85;r.pct_fines=15;r._confidence++;r._matched.push("soil-hint");}
  }

  return r;
}

function processVoiceResult(transcript,layerIdx){
  // Try offline parser first
  var offline=parseOffline(transcript);
  if(offline._confidence>=5){
    // Confident enough — use offline result
    toast("Offline parse ("+offline._confidence+" matches: "+offline._matched.join(",")+")");
    applyVoiceParsed(offline,layerIdx,transcript);
  } else if(getApiKey()){
    // Low confidence — fall back to Claude
    toast("Low confidence ("+offline._confidence+") — asking Claude...");
    parseVoiceWithClaude(transcript,layerIdx);
  } else {
    // No API key and low confidence — use what we got
    toast("Offline parse (low confidence "+offline._confidence+")");
    applyVoiceParsed(offline,layerIdx,transcript);
  }
}

function parseVoiceWithClaude(transcript,layerIdx){
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":CLAUDE_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:500,
      system:SOIL_PARSE_PROMPT,
      messages:[{role:"user",content:"Parse this soil description: \""+transcript+"\""}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){toast("API error: "+data.error.message);resetVoiceBtn(layerIdx);return;}
    var text=data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    var clean=text.replace(/```json|```/g,"").trim();
    try{
      var parsed=JSON.parse(clean);
      applyVoiceParsed(parsed,layerIdx,transcript);
    }catch(e){
      toast("Could not parse AI response");
      // Store raw transcript in description as fallback
      borings[bi].lithology[layerIdx].description=transcript;
      renderBody();
    }
    resetVoiceBtn(layerIdx);
  })
  .catch(function(err){
    toast("Network error — are you online?");
    // Offline fallback: put transcript in description for manual parsing later
    borings[bi].lithology[layerIdx].description="[VOICE] "+transcript;
    renderBody();
    resetVoiceBtn(layerIdx);
  });
}

function applyVoiceParsed(p,layerIdx,transcript){
  var l=borings[bi].lithology[layerIdx];
  if(p.color) l._color=p.color;
  if(p.moisture) l._moisture=p.moisture;
  if(p.gradation) l._grad=p.gradation;
  if(p.structure) l._struct=p.structure;
  if(p.extra) l._extra=p.extra;
  if(p.density) l._density=p.density;
  if(p.pct_gravel!=null) l.gr=+p.pct_gravel;
  if(p.pct_sand!=null) l.sa=+p.pct_sand;
  if(p.pct_fines!=null) l.fi=+p.pct_fines;
  if(p.top_ft!=null) l.top=+p.top_ft;
  if(p.bot_ft!=null) l.bot=+p.bot_ft;

  // Handle special types
  if(p.uscs_override==="AC"||p.uscs_override==="FILL"||p.uscs_override==="TOP"){
    l.uscs=p.uscs_override;
    l.gr=0;l.sa=0;l.fi=0;
    if(p.uscs_override==="AC") l.description="Asphalt surfacing.";
    else if(p.uscs_override==="FILL") l.description="FILL material.";
    else l.description="Topsoil.";
  } else {
    // Auto-classify and generate description
    var cl=classify(l.gr,l.sa,l.fi);
    l.uscs=cl.s||l.uscs;
    var nm=cl.n;
    if(l._extra&&nm.indexOf(l._extra)<0) nm=nm+" "+l._extra;
    l.description=buildDesc(nm,l.uscs,l._color||"",l._moisture||"",l._grad||"",l._struct||"massive",l._density||"");
  }

  // Append notes to description if present
  if(p.notes){
    l.description=l.description.replace(/\.$/,"")+". "+p.notes+".";
    l.description=l.description.replace(/\.\./g,".");
  }

  l._voiceTranscript=transcript;
  // Store training pair
  _voiceTraining.push({transcript:transcript,fields:{color:l._color,moisture:l._moisture,grad:l._grad,struct:l._struct,extra:l._extra,density:l._density||"",gr:l.gr,sa:l.sa,fi:l.fi,top:l.top,bot:l.bot,uscs:l.uscs,notes:p.notes||""}});
  toast("Voice entry applied — "+l.uscs+" "+l._color);
  renderBody();
}

function resetVoiceBtn(layerIdx){
  var btn=document.getElementById("voiceBtn_"+layerIdx);
  if(btn){btn.textContent="🎙 Speak";btn.style.background="#7c3aed";}
}

// ===== GUIDED VOICE CORE WORKFLOW =====
var _voiceStep="idle"; // idle, core, soil, pid, sample
var _voiceCoreIdx=null; // index of core run being voice-entered

function voiceStatus(msg,color){
  var el=document.getElementById("voiceStatus");
  if(el){el.textContent=msg;el.style.background=color||"#1e3a5f";}
}

window.startVoiceCore=function(){
  _voiceStep="core";
  var b=B();
  var lastS=b.samplers[b.samplers.length-1];
  var nextTop=lastS?(lastS.top||0)+(lastS.tool_len||5):0;
  toast("Say: core depth and recovery (e.g. '"+nextTop+" to "+(nextTop+5)+", recovery 4 feet')");
  voiceListen(function(transcript){
    parseCoreVoice(transcript,nextTop);
  });
};

window.voiceNextStep=function(){
  if(_voiceStep==="core"){
    _voiceStep="soil";
    toast("Say: soil description, then 'stop'");
    // Auto-create soil layer for this core
    var b=B();var s=b.samplers[_voiceCoreIdx];
    if(s){
      var existing=b.lithology.filter(function(l){return l.top>=s.top&&l.top<s.bot;});
      if(!existing.length){
        b.lithology.push({top:s.top,bot:s.bot,description:"",uscs:"SM",gr:0,sa:70,fi:30,_color:"brown",_moisture:"moist",_grad:"fine to coarse",_struct:"massive",_density:"",_extra:""});
        b.lithology.sort(function(a,b2){return a.top-b2.top;});
      }
    }
    var lithoIdx=-1;
    for(var i=0;i<b.lithology.length;i++){if(b.lithology[i].top>=s.top&&b.lithology[i].top<s.bot){lithoIdx=i;break;}}
    tab="litho";expL=lithoIdx>=0?lithoIdx:null;renderAll();
    voiceListen(function(transcript){
      if(lithoIdx>=0) processVoiceResult(transcript,lithoIdx);
      _voiceStep="pid";
      renderAll();
    });
  } else if(_voiceStep==="soil"||_voiceStep==="pid"){
    _voiceStep="pid";
    toast("Say PID readings: 'depth reading' pairs, then 'stop'. E.g. '1 foot 0.1, 2 foot 0.3'");
    tab="pid";renderAll();
    voiceListen(function(transcript){
      parsePIDVoice(transcript);
      _voiceStep="sample";
      renderAll();
    });
  } else if(_voiceStep==="pid"||_voiceStep==="sample"){
    _voiceStep="sample";
    toast("Say sample interval, e.g. '2 to 3 feet', or 'no sample'");
    tab="samples";renderAll();
    voiceListen(function(transcript){
      parseSampleVoice(transcript);
      _voiceStep="idle";
      _voiceCoreIdx=null;
      tab="samplers";renderAll();
      toast("Core complete! Tap 🎙 Start Core for next run.");
    });
  }
};

window.voiceSkipStep=function(){
  if(_voiceStep==="soil"){_voiceStep="pid";toast("Skipped soil — say PID readings");tab="pid";renderAll();}
  else if(_voiceStep==="pid"){_voiceStep="sample";toast("Skipped PID — say sample interval");tab="samples";renderAll();}

};

function voiceListen(callback){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast("Speech recognition not available");return;}
  if(window._activeRecognition){window._activeRecognition.stop();window._activeRecognition=null;}

  var recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang="en-US";
  window._activeRecognition=recognition;
  var fullTranscript="";

  var btn=document.getElementById("voiceCoreBtn");
  if(btn){btn.textContent="🎙 Listening... (say STOP)";btn.style.background="#dc2626";}

  recognition.onresult=function(event){
    var interim="";fullTranscript="";
    for(var i=0;i<event.results.length;i++){
      var t2=event.results[i][0].transcript;
      if(event.results[i].isFinal) fullTranscript+=t2+" ";
      else interim+=t2;
    }
    var combined=(fullTranscript+interim).trim();
    if(btn){var preview=combined.length>30?combined.substring(combined.length-30)+"...":combined;btn.textContent="🎙 "+preview;}
    var lower=combined.toLowerCase();
    if(lower.endsWith("stop")||lower.endsWith("stop.")||lower.endsWith("stop recording")){
      recognition.stop();
      fullTranscript=combined.replace(/\s*(stop recording|stop)\.?\s*$/i,"").trim();
      window._activeRecognition=null;
      if(btn){btn.textContent="🎙 Start Core";btn.style.background="#7c3aed";}
      if(fullTranscript) callback(fullTranscript);
    }
  };
  recognition.onerror=function(){
    if(btn){btn.textContent="🎙 Start Core";btn.style.background="#7c3aed";}
    window._activeRecognition=null;
  };
  recognition.onend=function(){
    if(window._activeRecognition===recognition){
      window._activeRecognition=null;
      fullTranscript=fullTranscript.trim();
      if(btn){btn.textContent="🎙 Start Core";btn.style.background="#7c3aed";}
      if(fullTranscript) callback(fullTranscript);
    }
  };
  recognition.start();
}

function parseCoreVoice(transcript,defaultTop){
  var low=transcript.toLowerCase().replace(/\bfeet\b/g,"ft").replace(/\bfoot\b/g,"ft");
  var top=defaultTop,len=5,recovery="";

  // "X to Y" → top and bot, derive length
  var dm=low.match(/(\d+(?:\.\d+)?)\s*(?:to|through)\s*(\d+(?:\.\d+)?)/);
  if(dm){top=+dm[1];var bot=+dm[2];len=bot-top;}

  // "starting at X" or "top at X"
  var tm=low.match(/(?:starting|top|start)\s*(?:at\s*)?(\d+(?:\.\d+)?)/);
  if(tm) top=+tm[1];

  // Core length: "5 foot core" or "five foot run"
  var lm=low.match(/(\d+(?:\.\d+)?)\s*(?:ft)?\s*(?:core|run|push)/);
  if(lm) len=+lm[1];

  // "next X feet"
  var nm=low.match(/next\s+(\d+(?:\.\d+)?)\s*ft/);
  if(nm) len=+nm[1];

  // Recovery
  if(/\bnr\b|no recovery|nothing back|no return/.test(low)){
    recovery="NR";
  } else if(/full recovery|got it all|all back|100/.test(low)){
    recovery=String(len);
  } else {
    var rm=low.match(/(?:recovery|recovered|got back|back)\s*(?:is\s*|of\s*)?(\d+(?:\.\d+)?)/);
    if(rm) recovery=rm[1];
    // Also try bare "X feet recovery" or "X.X recovery"
    if(!recovery){var rm2=low.match(/(\d+(?:\.\d+)?)\s*(?:ft\s*)?(?:recovery|of recovery)/);if(rm2) recovery=rm2[1];}
  }

  var bot=top+len;
  var b=B();
  b.samplers.push({top:top,bot:bot,tool_len:len,recovery:recovery,custom_interval:false,recov_top:null,recov_bot:null});
  _voiceCoreIdx=b.samplers.length-1;
  toast("Core #"+b.samplers.length+": "+top+"–"+bot+" ft, recovery: "+(recovery||"not set"));
  renderBody();
}

function parsePIDVoice(transcript){
  var low=transcript.toLowerCase().replace(/\bfeet\b/g,"ft").replace(/\bfoot\b/g,"ft");
  var b=B();
  // Match patterns like "1 ft 0.1" or "at 2 feet reading 0.3" or "2 foot point 3"
  // Also "1 foot background" or "zero at 1 foot"
  var pidPattern=/(?:(?:at\s+)?(\d+(?:\.\d+)?)\s*(?:ft)?\s*(?:reading\s*|is\s*)?(\d+(?:\.\d+)?|background|zero|non-detect|nd|bdl))/gi;
  var match;
  while((match=pidPattern.exec(low))!==null){
    var depth=+match[1];
    var reading=match[2];
    if(/background|zero|non-detect|nd|bdl/i.test(reading)) reading="0";
    b.pid.push({depth:depth,reading:reading});
  }
  // Also try "point X" patterns: "1 ft point 1" → 0.1
  var pointPattern=/(\d+(?:\.\d+)?)\s*ft\s*point\s*(\d+)/gi;
  while((match=pointPattern.exec(low))!==null){
    var depth2=+match[1];
    var reading2="0."+match[2];
    // Check if we already added this depth
    var exists=b.pid.some(function(p){return +p.depth===depth2;});
    if(!exists) b.pid.push({depth:depth2,reading:reading2});
  }
  if(b.pid.length) toast("Added "+b.pid.length+" PID reading(s)");
  else toast("No PID readings detected — add manually if needed");
  renderBody();
}

function parseSampleVoice(transcript){
  var low=transcript.toLowerCase().replace(/\bfeet\b/g,"ft").replace(/\bfoot\b/g,"ft");
  if(/no sample|skip|none/.test(low)){toast("No sample");return;}
  var b=B();
  // "2 to 3" or "from 2 to 3 feet" or "2-3"
  var sm=low.match(/(\d+(?:\.\d+)?)\s*(?:to|-)\s*(\d+(?:\.\d+)?)/);
  if(sm){
    b.samples.push({interval:sm[1]+"-"+sm[2],time:"",dup:false,remarks:""});
    toast("Sample: "+sm[1]+"–"+sm[2]+" ft");
  } else {
    toast("Couldn't parse sample interval — add manually");
  }
  renderBody();
}

// Returns array of {top, bot} objects representing recovered depth intervals
function getRecoveredZones(b){
  var zones=[];
  (b.samplers||[]).forEach(function(s){
    if(s.recovery==="NR"||s.recovery==="N/A"||!s.recovery) return;
    var recFt=parseFloat(s.recovery);
    if(isNaN(recFt)||recFt<=0) return;
    if(s.custom_interval&&s.recov_top!=null&&s.recov_bot!=null){
      zones.push({top:parseFloat(s.recov_top),bot:parseFloat(s.recov_bot)});
    } else {
      zones.push({top:parseFloat(s.top),bot:parseFloat(s.top)+recFt});
    }
  });
  return zones;
}

// Check if a sample interval falls within recovered zones
function isInRecoveredZone(b,sampTop,sampBot){
  var zones=getRecoveredZones(b);
  if(zones.length===0) return true; // no recovery data entered yet, allow
  for(var i=0;i<zones.length;i++){
    if(sampTop>=zones[i].top&&sampBot<=zones[i].bot) return true;
  }
  return false;
}

// Check if a single depth point falls within recovered zones
function isDepthRecovered(b,d){
  var zones=getRecoveredZones(b);
  if(zones.length===0) return true;
  for(var i=0;i<zones.length;i++){
    if(d>=zones[i].top&&d<=zones[i].bot) return true;
  }
  return false;
}

function doShare(){
  var d=JSON.stringify(borings,null,2);
  var fname="boring_"+(B().id||"logs")+"_"+new Date().toISOString().slice(0,10)+".json";
  var blob=new Blob([d],{type:"application/json"});

  // Try 1: Share as file (works on iOS 15+ Safari, Android Chrome)
  try{
    var file=new File([blob],fname,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:"Boring Log - "+B().id}).catch(function(){});
      return;
    }
  }catch(e){}

  // Try 2: Share as download URL (creates a temp object URL)
  try{
    if(navigator.share){
      navigator.share({
        title:"Boring Log - "+(B().id||"data"),
        text:"Boring log data for "+(B().id||"project")+"\n\n"+d.substring(0,500)+"..."
      }).catch(function(){});
      return;
    }
  }catch(e){}

  // Try 3: Copy to clipboard
  try{
    navigator.clipboard.writeText(d).then(function(){
      toast("Copied to clipboard — paste into a file or message");
    });
    return;
  }catch(e){}

  // Fallback: just download
  doSave();
}

// Editable dropdown: input + datalist. Allows custom entry but shows suggestions.
function sel(id,val,options,blankLabel){
  var lid='dl'+(_dlid++);
  var isNum=false;
  // Check if options are all numbers
  if(options.length>0){
    var first=Array.isArray(options[0])?options[0][0]:options[0];
    if(typeof first==='number'||(!isNaN(parseFloat(first))&&first!==''))isNum=true;
  }
  var h='<input class="fi" list="'+lid+'" value="'+esc(String(val==null||val===""?"":val))+'" placeholder="--"';
  if(isNum) h+=' inputmode="decimal"';
  h+=' onfocus="clearDash(this)" onchange="handleChange(\''+id+'\',this.value)" />';
  h+='<datalist id="'+lid+'">';
  options.forEach(function(o){
    var v=Array.isArray(o)?o[0]:o;
    var lb=Array.isArray(o)?o[1]:o;
    if(v===""&&!blankLabel) return; // skip blank option
    h+='<option value="'+esc(String(v))+'">'+(lb!=null&&lb!==v?esc(String(lb)):"")+'</option>';
  });
  h+='</datalist>';return h;
}

// Text input with -- placeholder
function inp(id,val,placeholder){
  var ph=placeholder||"--";
  return '<input class="fi" value="'+esc(String(val||""))+'" placeholder="'+esc(ph)+'" onfocus="clearDash(this)" onchange="handleChange(\''+id+'\',this.value)" />';
}

// Number input: shows decimal keyboard, enforces numeric
function numInp(id,val,placeholder){
  var ph=placeholder||"--";
  return '<input class="fi" inputmode="decimal" value="'+esc(String(val||""))+'" placeholder="'+esc(ph)+'" onfocus="clearDash(this)" onchange="handleNumChange(\''+id+'\',this)" />';

// Clear "--" default on focus
window.clearDash=function(el){
  if(el.value==="--"||el.value==="- -") el.value="";
};

// Numeric change handler - strips non-numeric, allows negatives and decimals
window.handleNumChange=function(id,el){
  var v=el.value.replace(/[^0-9.\-]/g,"");
  if(v!==""&&isNaN(parseFloat(v))){v="";el.value="";}
  else el.value=v;
  handleChange(id,v);
};

function field(label,content,half){

// ===== CHANGE HANDLER =====
window.handleChange=function(id,val){
  var parts=id.split(".");
  if(parts.length===1){
    var f=parts[0];
    if(f==="total_depth"){val=parseFloat(val);if(isNaN(val))val=15;}
    borings[bi][f]=val;
  }else if(parts.length===3){
    var arr=parts[0],idx=+parts[1],fld=parts[2];
    if(["top","bot","tool_len","depth","gr","sa","fi","recov_top","recov_bot"].indexOf(fld)>=0){
      val=parseFloat(val);if(isNaN(val))val=0;
    }
    if(fld==="dup"||fld==="custom_interval")val=(val==="true"||val===true);
    borings[bi][arr][idx][fld]=val;
    // Auto-populate bot from top + core length
    if(arr==="samplers"&&(fld==="top"||fld==="tool_len")){
      var sm=borings[bi].samplers[idx];
      sm.bot=(parseFloat(sm.top)||0)+(parseFloat(sm.tool_len)||5);
    }
  }
  renderBody();
};

      }
      // Description text + grain %
      var midY=(ftY(lt)+ftY(lb))/2;
      var desc=l.description||"";
      if(desc.length>60) desc=desc.substring(0,57)+"...";
      h+='<text x="'+(cDesc+3)+'" y="'+(midY-1)+'" font-size="5" fill="#1a1a1a">'+esc(desc)+'</text>';
      if(l.uscs!=="AC"&&(l.gr!=null||l.sa!=null||l.fi!=null)){
        h+='<text x="'+(cDesc+3)+'" y="'+(midY+6)+'" font-size="4.5" fill="#888">G-'+(l.gr||0)+'% S-'+(l.sa||0)+'% F-'+(l.fi||0)+'%</text>';
      }
    });

    // No recovery labels in desc column
    nrZones.forEach(function(z){
      var yt=ftY(Math.max(z.top,0)),yb=ftY(Math.min(z.bot,td));
      if(yt>=yb) return;
      var my=(yt+yb)/2;
      h+='<text x="'+(cDesc+3)+'" y="'+(my+2)+'" font-size="5" fill="#999" font-style="italic">No recovery '+z.top+'–'+z.bot+' ft</text>';
    });

    // PID readings
    var pidMax=Math.max.apply(null,(b.pid||[]).map(function(p){return parseFloat(p.reading)||0;}).concat([1]));
    (b.pid||[]).forEach(function(p){
      var d=parseFloat(p.depth);if(isNaN(d)||d<0||d>td) return;
      var y=ftY(d);
      var val=parseFloat(p.reading);
      // Mini bar
      if(!isNaN(val)&&val>0){
        var bw=Math.min(wPID-10,(val/pidMax)*(wPID-10));
        h+='<rect x="'+(cPID+1)+'" y="'+(y-2)+'" width="'+bw+'" height="3" fill="rgba(96,165,250,0.3)" rx="1"/>';
      }
      h+='<text x="'+(cPID+wPID-2)+'" y="'+(y+2)+'" text-anchor="end" font-size="4.5" fill="#333">'+esc(String(p.reading))+'</text>';
    });

    // Sample bars
    (b.samples||[]).forEach(function(sm){
      var parts=(sm.interval||"").split("-").map(Number);
      if(parts.length!==2) return;
      var yt=ftY(parts[0]),yb=ftY(parts[1]);
      h+='<rect x="'+(rEdge-18)+'" y="'+yt+'" width="6" height="'+(yb-yt)+'" fill="#475569" rx="1"/>';
      h+='<text x="'+(rEdge-10)+'" y="'+((yt+yb)/2+2)+'" font-size="4" fill="#2563eb">'+esc(sm.interval)+'</text>';
    });

    // GW marker
    var gwd=parseFloat(b.gw_first);
    if(!isNaN(gwd)&&gwd>=0&&gwd<=td){
      var gy=ftY(gwd);
      h+='<line x1="'+cLitho+'" y1="'+gy+'" x2="'+(cLitho+wLitho)+'" y2="'+gy+'" stroke="#2563eb" stroke-width="1"/>';
      h+='<text x="'+(rEdge-2)+'" y="'+(gy+3)+'" text-anchor="end" font-size="5" font-weight="bold" fill="#2563eb">GW '+esc(b.gw_first)+'</text>';
    }

    // TD line
    var tdy=ftY(td);
    h+='<line x1="'+M+'" y1="'+tdy+'" x2="'+rEdge+'" y2="'+tdy+'" stroke="#1a1a1a" stroke-width="1.5"/>';
    h+='<text x="'+(svgW/2)+'" y="'+(tdy+10)+'" text-anchor="middle" font-size="6" font-weight="bold" fill="#1a1a1a">'+td+' ft — Bottom of Boring</text>';

    // Remarks
    if(b.remarks){
      h+='<text x="'+M+'" y="'+(tdy+20)+'" font-size="5" fill="#555" font-style="italic">'+esc(b.remarks)+'</text>';
    }

    h+='</svg>';

    // QC checklist below preview
    var issues=[];
    if(!(b.lithology||[]).length) issues.push("No soil layers entered");
    if(!(b.pid||[]).length) issues.push("No PID readings");
    if(!(b.samplers||[]).length) issues.push("No core runs logged");
    if(!b.id) issues.push("Missing boring ID");
    if(!b.date_start) issues.push("Missing date");
    // Check grain pct totals
    (b.lithology||[]).forEach(function(l){
      if(l.uscs!=="AC"&&l.gr+l.sa+l.fi!==100) issues.push("Layer "+l.top+"–"+l.bot+" ft: grain % ≠ 100");
    });
    // Check for samples outside recovery
    (b.samples||[]).forEach(function(s){
      if(!s.interval) return;
      var parts=s.interval.split("-").map(Number);
      if(parts.length===2&&hasRec&&!isInRecoveredZone(b,parts[0],parts[1])){
        issues.push("Sample "+s.interval+" outside recovered zone");
      }
    });

    if(issues.length>0){
      h+='<div style="margin-top:10px">';
      issues.forEach(function(iss){
        h+='<div style="background:#7f1d1d;color:#fca5a5;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:4px">⚠ '+esc(iss)+'</div>';
      });
      h+='</div>';
    } else {
      h+='<div style="background:#14532d;color:#86efac;padding:10px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;margin-top:10px">✓ Log looks complete — ready to move on</div>';
    }

    h+='</div>';
  }

  else if(tab==="summary"){
    h+='<div class="card"><div class="ctitle">Log Summary - '+(b.id||"?")+'</div>';
    h+='<div style="font-size:12px;color:#94a3b8;line-height:1.8">';
    h+='<div><b style="color:#e2e8f0">'+esc(b.id)+'</b> | '+esc(b.date_start)+' | '+esc(b.location)+', '+esc(b.city)+'</div>';
    h+='<div>'+esc(b.drill_co)+' | '+esc(b.method)+' | '+esc(b.equipment)+'</div>';
    h+='<div>TD: '+b.total_depth+' ft | GW: '+esc(b.gw_first)+' ft | Rep: '+esc(b.field_rep)+'</div></div>';
    h+='<div class="dvd"></div><div class="stitle">Soil Profile</div>';
    (b.lithology||[]).forEach(function(l){
      h+='<div class="slay"><div class="ssw" style="background:'+(UC[l.uscs]||"#666")+'">'+esc(l.uscs)+'</div>';
      h+='<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#e2e8f0">'+l.top+' - '+l.bot+' ft</div>';
      h+='<div style="font-size:11px;color:#cbd5e1">'+esc(l.description)+'</div>';
      h+='<div style="font-size:10px;color:#64748b">GR:'+l.gr+'% SA:'+l.sa+'% FI:'+l.fi+'%</div></div></div>';
    });
    h+='<div class="dvd"></div><div style="font-size:12px;color:#94a3b8">';
    h+='<div>Core runs: '+(b.samplers||[]).length+'</div>';
    h+='<div>PID: '+(b.pid||[]).length+' readings</div>';
    h+='<div>Soil samples: '+(b.samples||[]).length+'</div>';
    h+='<div>GW samples: '+(b.gw_samples||[]).length+'</div>';
    h+='<div>Photos: '+(b.photos||[]).length+'</div></div>';
    if(b.remarks) h+='<div style="margin-top:8px;font-size:12px;color:#fbbf24;font-style:italic">'+esc(b.remarks)+'</div>';
    h+='<button class="btn btn-blue" style="margin-top:16px" onclick="doSave()">Save JSON</button>';
    h+='<div style="margin-top:8px;font-size:11px;color:#86efac;text-align:center">✓ Auto-saving to browser storage</div>';
    if(_voiceTraining.length>0){
      h+='<div style="margin-top:12px;font-size:11px;color:#a78bfa">🎙 '+_voiceTraining.length+' voice entries recorded for training data</div>';
      h+='<button class="btn" style="background:#7c3aed;margin-top:4px;font-size:12px;padding:10px" onclick="exportTraining()">Export Voice Training Data</button>';
    }
    h+='<button class="btn" style="background:#dc2626;margin-top:16px;font-size:12px;padding:10px" onclick="if(confirm(\'Clear all saved data and start fresh?\')){localStorage.removeItem(\'fieldlog_borings\');localStorage.removeItem(\'fieldlog_bi\');localStorage.removeItem(\'fieldlog_tab\');borings=[mkBlank()];bi=0;tab=\'header\';expL=null;renderAll();toast(\'Cleared\');}">Clear Data &amp; Start Fresh</button>';
    h+='</div>';
  }

  document.getElementById("body").innerHTML=h;
  renderBsel();
  autoSave();
}

window.addLitho=function(t){
  borings[bi].lithology.push({top:t,bot:t+5,description:"",uscs:"SM",gr:0,sa:70,fi:30,_color:"brown",_moisture:"moist",_grad:"fine to coarse",_struct:"massive",_density:"",_extra:""});
  expL=borings[bi].lithology.length-1;
  renderBody();
};

window.autoDesc=function(idx){
  var l=borings[bi].lithology[idx];
  var cl=classify(l.gr,l.sa,l.fi);
  var nm=cl.n;var ex=l._extra||"";
  if(ex&&nm.indexOf(ex)<0)nm=nm+" "+ex;
  var desc=buildDesc(nm,cl.s,l._color||"",l._moisture||"",l._grad||"",l._struct||"massive",l._density||"");
  borings[bi].lithology[idx].description=desc;
  borings[bi].lithology[idx].uscs=cl.s;
  renderBody();
};

renderAll();
</script>
</body>
</html>
